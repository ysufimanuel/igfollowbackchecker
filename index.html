<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-100 p-8 transition-all hover:shadow-md">
    
    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 id="title" class="text-2xl font-bold tracking-tight text-slate-900">IG Checker</h1>
            <p id="desc" class="text-sm text-slate-500 mt-1">Cek siapa yang tidak follback</p>
        </div>
        <select id="langSwitch" class="bg-slate-50 border border-slate-200 text-slate-600 text-xs rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="id">ID</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div class="space-y-4 mb-8">
        <div class="group">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">upload: "followers-1.json"</label>
            <input type="file" id="followersFile" accept=".json" 
                class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor:pointer outline-none">
        </div>

        <div class="group">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">upload: "following.json"</label>
            <input type="file" id="followingFile" accept=".json" 
                class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor:pointer outline-none">
        </div>
    </div>

    <button onclick="analyze()" id="analyzeBtn" 
        class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-slate-200">
        Mulai Analisis
    </button>

    <div id="result" class="mt-8 empty:hidden border-t border-slate-100 pt-6"></div>
</div>

<script src="js/script.js"></script>
</body>

</html>
